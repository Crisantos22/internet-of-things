<!DOCTYPE html>
<html lang="esp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potenciometro</title>
    <style>
        body{
            font-family: sans-serif;
            text-align: center;
            margin: 50px;
        }

        h1{
            color: cornflowerblue;
        }

        #potValue{
            font-size: 24px;
            color: blue;
        }

    </style>
</head>
<body>
    <h1>Lectura del Potenciometro</h1>
    <p> Valor Actual</p>
    <p id="potValue"> --- </p>
    <script>
        function updatePot(){
            fetch('/pot')
            .then(response => response.text())
            .then(data =>document.getElementById('potValue').innerText = data)
        }
        setInterval(updatePot, 1000);

    </script>
</body>
</html>
